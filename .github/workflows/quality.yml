name: Code Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --force

      - name: ESLint
        run: npx eslint .

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build
