name: Code Quality

# 质量检查在 push 到 main 时由 deploy.yml 的 quality 作业统一跑（并链式门禁部署）。
# 本工作流仅用于 PR 评审反馈与手动触发，避免重复运行。
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --force

      - name: ESLint
        run: npx eslint .

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build
